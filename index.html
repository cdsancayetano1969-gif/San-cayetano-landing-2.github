  <style>
    :root {
      --bg: #050816;
      --bg-elevated: #0b1020;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --accent-strong: #6366f1;
      --text-main: #f9fafb;
      --text-soft: #9ca3af;
      --border-subtle: rgba(148, 163, 184, 0.35);
      --danger: #f97373;
      --radius-lg: 18px;
      --radius-xl: 24px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.55);
      --shadow-subtle: 0 10px 30px rgba(15, 23, 42, 0.45);
      --blur-strong: blur(22px);
      --max-width: 1120px;
      --logo-size: 48px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: radial-gradient(circle at 0% 0%, #111827 0, #020617 35%, #020617 100%);
      color: var(--text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Inter", Segoe UI, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 24px 16px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-inner {
      width: 100%;
      max-width: var(--max-width);
    }

    /* LOGO */
    .logo-image {
      width: var(--logo-size);
      height: var(--logo-size);
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      background: rgba(15, 23, 42, 0.7);
      padding: 4px;
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    /* NAV */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .logo-subtitle {
      font-size: 0.78rem;
      color: var(--text-soft);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .nav-tag {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: radial-gradient(circle at 0 0, rgba(79, 70, 229, 0.25), transparent 70%);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
    }

    .nav-link-ghost {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 160ms ease;
    }

    .nav-link-ghost:hover {
      border-color: rgba(148, 163, 184, 0.6);
      color: #e5e7eb;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1.1fr);
      gap: 40px;
      align-items: center;
      margin-bottom: 40px;
    }
