<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App San Cayetano - Seguimiento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: white;
            min-height: 100vh;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .logo {
            width: 200px;
            height: 200px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 20px 40px rgba(59, 130, 246, 0.5));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #3b82f6, #06b6d4, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5)); }
            to { filter: drop-shadow(0 0 30px rgba(6, 182, 212, 0.7)); }
        }

        .cta {
            font-size: 1.5rem;
            margin: 2rem 0;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        .cta-button {
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            border: none;
            padding: 1.5rem 3rem;
            font-size: 1.3rem;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 20px 60px rgba(59, 130, 246, 0.6); }
            100% { box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4); }
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(59, 130, 246, 0.6);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(59, 130, 246, 0.6);
            border-radius: 50%;
            animation: rise 10s linear infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .logo { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="particles" id="particles"></div>
        <img src="logo-sanca.jpg" alt="Club Deportivo San Cayetano" class="logo">
        <h1>San Cayetano</h1>
        <p class="cta">Tu app oficial de seguimiento. ¡Vive cada momento!</p>
        <a href="https://seguimiento-bice.vercel.app" class="cta-button">Abrir App Ahora</a>
        <div class="scroll-indicator">↓</div>
    </section>

    <script>
        // Generar partículas flotantes
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = (Math.random() * 5 + 2) + 'px';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        // Parallax suave en scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            document.querySelector('.hero').style.transform = `translateY(${scrolled * 0.5}px)`;
        });
    </script>
</body>
</html>
